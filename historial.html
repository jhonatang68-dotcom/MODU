<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GRapp · Historial Mensual</title>

<style>
body { margin: 0; font-family: Arial, sans-serif; background: #f4f6f8; }
header {
    background: #111; color: white; padding: 14px;
    display: flex; align-items: center; justify-content: space-between;
}
.header-left { display: flex; align-items: center; gap: 15px; }
.home-icon { width: 22px; height: 22px; fill: #f2f2f2; cursor: pointer; }
.container { padding: 20px; }
h2 { margin-top: 0; color: #2c3e50; }

table {
    width: 100%; border-collapse: collapse; background: white;
    border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}
th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
th { background: #eee; font-size: 13px; text-transform: uppercase; }

.pos { color: #27ae60; font-weight: bold; }
.neg { color: #e74c3c; font-weight: bold; }

button {
    background: #3498db; color: white; border: none;
    border-radius: 5px; padding: 8px 15px; cursor: pointer; font-weight: bold;
}
.btn-sincro { background: #2ecc71; margin-right: 10px; }

/* Indicador de carga */
#status { font-size: 12px; color: #3498db; margin-bottom: 10px; display: none; }
</style>
</head>

<body>

<header>
    <div class="header-left">
        <svg class="home-icon" onclick="location.href='index.html'" viewBox="0 0 24 24">
            <path d="M3 10.5L12 3l9 7.5V21a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/>
        </svg>
        <strong>Historial Mensual Grafik</strong>
    </div>
    <button class="btn-sincro" onclick="sincronizarTodo()">🔄 Sincronizar Nube</button>
</header>

<div class="container">
    <div id="status">Sincronizando datos con la nube...</div>
    <h2>Resumen de Utilidades</h2>

    <table>
        <thead>
            <tr>
                <th>Mes / Período</th>
                <th>Ingresos</th>
                <th>Egresos</th>
                <th>Resultado Neto</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="tablaHistorial"></tbody>
    </table>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA1BFZ8DZqLx_iimasn9CHgYPKTBhfNfb0",
    authDomain: "modu-6b2b5.firebaseapp.com",
    projectId: "modu-6b2b5",
    storageBucket: "modu-6b2b5.firebasestorage.app",
    messagingSenderId: "139925953689",
    appId: "1:139925953689:web:6f55990a882e4d652bac08"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.sincronizarTodo = async () => {
    document.getElementById("status").style.display = "block";
    try {
      // Traer Ingresos
      const snapIng = await getDocs(collection(db, "ingresos"));
      const listIng = snapIng.docs.map(doc => doc.data());
      localStorage.setItem("ingresos", JSON.stringify(listIng));

      // Traer Egresos
      const snapEgr = await getDocs(collection(db, "egresos"));
      const listEgr = snapEgr.docs.map(doc => doc.data());
      localStorage.setItem("egresos", JSON.stringify(listEgr));

      alert("✅ Datos actualizados de Grafik.");
      location.reload();
    } catch (e) {
      console.error(e);
      alert("Error al sincronizar.");
    }
    document.getElementById("status").style.display = "none";
  }
</script>

<script>
function pintar() {
    const ingresos = JSON.parse(localStorage.getItem("ingresos")) || [];
    const egresos  = JSON.parse(localStorage.getItem("egresos"))  || [];
    const resumen = {};

    // Procesar Ingresos
    ingresos.forEach(i => {
        if (i.estado !== "ACTIVO" || !i.mes || !i.anio) return;
        const clave = i.anio + "-" + i.mes;
        if (!resumen[clave]) resumen[clave] = { mes: i.mes, anio: i.anio, ing: 0, egr: 0 };
        resumen[clave].ing += Number(i.valor);
    });

    // Procesar Egresos
    egresos.forEach(e => {
        if (e.estado !== "ACTIVO" || !e.mes || !e.anio) return;
        const clave = e.anio + "-" + e.mes;
        if (!resumen[clave]) resumen[clave] = { mes: e.mes, anio: e.anio, ing: 0, egr: 0 };
        resumen[clave].egr += Number(e.valor);
    });

    const meses = Object.values(resumen).sort((a, b) => {
        if (a.anio !== b.anio) return b.anio - a.anio;
        return b.mes - a.mes;
    });

    const tabla = document.getElementById("tablaHistorial");
    tabla.innerHTML = "";

    meses.forEach(m => {
        const resultado = m.ing - m.egr;
        const clase = resultado >= 0 ? "pos" : "neg";
        
        // Formato de nombre de mes "Mayo 2026"
        const fechaObj = new Date(m.anio, m.mes - 1);
        let nombreMes = fechaObj.toLocaleString("es-ES", { month: "long", year: "numeric" });
        nombreMes = nombreMes.charAt(0).toUpperCase() + nombreMes.slice(1);

        tabla.innerHTML += `
            <tr>
                <td><strong>${nombreMes}</strong></td>
                <td>$ ${m.ing.toLocaleString()}</td>
                <td>$ ${m.egr.toLocaleString()}</td>
                <td class="${clase}">$ ${resultado.toLocaleString()}</td>
                <td>
                    <button onclick="verMes(${m.mes}, ${m.anio})">Ver Detalle</button>
                </td>
            </tr>
        `;
    });
}

function verMes(mes, anio) {
    localStorage.setItem("mesSeleccionado", mes);
    localStorage.setItem("anioSeleccionado", anio);
    location.href = "resumen_mes.html";
}

pintar();
</script>

</body>
</html>
