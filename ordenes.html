<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GRapp - Órdenes de Producción</title>
<style>
    body { font-family: Arial, sans-serif; background:#f4f6f8; margin:0; }
    header { background:#111; color:#fff; padding:15px; display:flex; justify-content:space-between; align-items:center; }
    .left { display:flex; align-items:center; gap:15px; }
    .home-icon { width:22px; height:22px; fill:#f2f2f2; cursor:pointer; }
    button { padding:6px 12px; border:none; border-radius:5px; background:#3498db; color:#fff; cursor:pointer; }
    .container { padding:20px; }
    .periodo { font-size:18px; font-weight:bold; margin-bottom:10px; }
    .total { font-size:22px; font-weight:bold; margin-bottom:15px; color: #2c3e50; }
    table { width:100%; border-collapse:collapse; background:#fff; margin-top: 15px; }
    th, td { padding:12px; border-bottom:1px solid #ddd; text-align: left; }
    th { background:#eee; }
    .filtros-historial { display: flex; align-items: center; gap: 10px; background: #ebedef; padding: 10px; border-radius: 5px; margin-bottom: 15px; }
    #buscador { height: 35px; padding: 4px 12px; width: 300px; border: 1px solid #ccc; border-radius: 4px; }
    .loading-nube { font-size: 12px; color: #3498db; margin-bottom: 10px; display: none; }
</style>
</head>
<body>

<header>
  <div class="left">
    <svg class="home-icon" onclick="location.href='index.html'" viewBox="0 0 24 24">
      <path d="M3 10.5L12 3l9 7.5V21a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/>
    </svg>
    <span>Órdenes de Producción</span>
  </div>
  <button onclick="location.href='crear_op.html'">+ Crear OP</button>
</header>

<div class="container">
  <div class="periodo" id="periodo">Viendo: Cargando...</div>
  <div id="statusNube" class="loading-nube">Sincronizando con la nube de Grafik...</div>

  <div class="filtros-historial">
    <input id="buscador" placeholder="Buscar orden, cliente, referencia..." oninput="pintar()">
    <label style="margin-left: 20px;">Filtrar Mes:</label>
    <select id="selectorMes" onchange="pintar()">
        <option value="1">Enero</option><option value="2">Febrero</option>
        <option value="3">Marzo</option><option value="4">Abril</option>
        <option value="5">Mayo</option><option value="6">Junio</option>
        <option value="7">Julio</option><option value="8">Agosto</option>
        <option value="9">Septiembre</option><option value="10">Octubre</option>
        <option value="11">Noviembre</option><option value="12">Diciembre</option>
    </select>
    <select id="selectorAnio" onchange="pintar()">
        <option value="2026">2026</option><option value="2025">2025</option>
    </select>
    <button style="background: #95a5a6;" onclick="volverAlActual()">Hoy</button>
    <button style="background: #3498db;" onclick="cargarDeLaNube()">🔄 Sincronizar</button>
  </div>

  <div class="total" id="totalVentas"></div>

  <table>
    <thead>
      <tr>
        <th>No.</th>
        <th>Fecha Pedido</th>
        <th>Entrega</th>
        <th>Cliente</th>
        <th>Referencia</th>
        <th>Valor</th>
        <th>Estado</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>
</div>

<div id="modalImpresion" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; backdrop-filter: blur(5px);">
    <div style="background:#fff; width:85%; height:92%; margin:2% auto; position:relative; border-radius:12px; overflow:hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.4);">
        <button onclick="cerrarModal()" style="position:absolute; top:15px; right:15px; background:#e74c3c; color:#fff; border:none; border-radius:50%; width:35px; height:35px; cursor:pointer; font-size:18px; font-weight:bold; z-index:10000; transition: 0.3s;">✕</button>
        <iframe id="frameImpresion" src="" style="width:100%; height:100%; border:none;"></iframe>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA1BFZ8DZqLx_iimasn9CHgYPKTBhfNfb0",
    authDomain: "modu-6b2b5.firebaseapp.com",
    projectId: "modu-6b2b5",
    storageBucket: "modu-6b2b5.firebasestorage.app",
    messagingSenderId: "139925953689",
    appId: "1:139925953689:web:6f55990a882e4d652bac08"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.cargarDeLaNube = async () => {
    const status = document.getElementById("statusNube");
    status.style.display = "block";
    try {
      const querySnapshot = await getDocs(collection(db, "ordenes"));
      const ordenesNube = [];
      querySnapshot.forEach((doc) => {
        ordenesNube.push(doc.data());
      });
      
      if(ordenesNube.length > 0) {
        localStorage.setItem("ordenes_grafik", JSON.stringify(ordenesNube));
        ordenes = ordenesNube; // Actualiza la variable global
        pintar();
        alert("¡Datos sincronizados desde la nube!");
      }
    } catch (e) {
      console.error("Error cargando nube:", e);
    }
    status.style.display = "none";
  }
</script>

<script>
const hoy = new Date();
const mesActual = hoy.getMonth() + 1;
const anioActual = hoy.getFullYear();

document.getElementById("selectorMes").value = mesActual;
document.getElementById("selectorAnio").value = anioActual;

let ordenes = JSON.parse(localStorage.getItem("ordenes_grafik")) || [];

function volverAlActual() {
    document.getElementById("selectorMes").value = mesActual;
    document.getElementById("selectorAnio").value = anioActual;
    pintar();
}

function imprimirOrden(id) {
    const ordenParaImprimir = ordenes.find(o => o.id == id);
    if (ordenParaImprimir) {
        localStorage.setItem("op_para_imprimir", JSON.stringify(ordenParaImprimir));
        document.getElementById("frameImpresion").src = "imprimir_op.html";
        document.getElementById("modalImpresion").style.display = "block";
    } else {
        alert("Error: No se encontró la orden.");
    }
}

function cerrarModal() {
    document.getElementById("modalImpresion").style.display = "none";
    document.getElementById("frameImpresion").src = "";
}

window.addEventListener('keydown', (e) => {
    if (e.key === "Escape") cerrarModal();
});

function pintar() {
    const tabla = document.getElementById("tabla");
    const totalDiv = document.getElementById("totalVentas");
    tabla.innerHTML = "";
    let total = 0;

    const mesSel = parseInt(document.getElementById("selectorMes").value);
    const anioSel = parseInt(document.getElementById("selectorAnio").value);
    const texto = document.getElementById("buscador").value.toLowerCase();

    const nombreMes = document.querySelector(`#selectorMes option[value="${mesSel}"]`).text;
    document.getElementById("periodo").innerText = `Viendo: ${nombreMes} ${anioSel}`;

    [...ordenes]
      .filter(o => o.mes === mesSel && o.anio === anioSel)
      .filter(o => 
          (o.numOP && o.numOP.toString().includes(texto)) || 
          (o.cliente && o.cliente.toLowerCase().includes(texto)) ||
          (o.ref && o.ref.toLowerCase().includes(texto))
      )
      .sort((a, b) => b.id - a.id) // Ordenar por ID de más nuevo a más viejo
      .forEach(o => {
          total += Number(o.total);
          tabla.innerHTML += `
            <tr>
              <td><b>${o.numOP}</b></td>
              <td>${o.fechaPedido}</td>
              <td style="color:red"><b>${o.fechaEntrega ? o.fechaEntrega.replace('T',' ') : '-'}</b></td>
              <td>${o.cliente}</td>
              <td style="font-size:11px">${o.ref || '-'}</td>
              <td>$ ${Number(o.total).toLocaleString()}</td>
              <td>${o.estado || 'ACTIVO'}</td>
              <td>
                <button onclick="imprimirOrden(${o.id})" style="background:#2ecc71;">🖨️ Ver</button>
              </td>
            </tr>`;
      });

    totalDiv.innerText = `TOTAL VENTAS DEL PERÍODO: $ ${total.toLocaleString()}`;
}

pintar();
</script>
</body>
</html>
