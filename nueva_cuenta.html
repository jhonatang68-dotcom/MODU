<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MODU - Nueva Cuenta</title>

<style>
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f8; margin: 0; padding: 0; color: #334155; } 

.container {
    max-width: 500px; 
    margin: 40px auto; 
    background: #fff;
    padding: 20px 25px; 
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

h2 { margin: 0 0 20px 0; font-size: 22px; color: #2c3e50; }

label { 
    display: block; 
    margin-top: 15px; 
    font-weight: bold; 
    font-size: 13px; 
    color: #34495e; 
    text-transform: uppercase;
}

input { 
    width: 100%; 
    padding: 12px; 
    margin-top: 5px; 
    box-sizing: border-box; 
    border: 1px solid #dce4ec; 
    border-radius: 6px; 
    font-size: 15px;
}

input:focus { 
    outline: none; 
    border-color: #3498db; 
    background-color: #f0f7fc; 
}

.botones { margin-top: 25px; display: flex; gap: 10px; }
button {
    flex: 1; padding: 14px; border: none; border-radius: 8px; 
    cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s;
}

.guardar { background: #3498db; color: #fff; }
.guardar:hover { background: #2980b9; }
.cancelar { background: #f1f2f6; color: #57606f; }
.cancelar:hover { background: #e2e8f0; }

.error { border-color: #e74c3c !important; background-color: #fdedec !important; }

/* Animación de entrada */
.container { animation: slideIn 0.3s ease-out; }
@keyframes slideIn {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

@media (max-width: 480px) {
    .container { margin: 20px 15px; padding: 20px; border-radius: 10px; }
    .botones { flex-direction: column; gap: 10px; }
    button { width: 100%; padding: 12px; }
    label { font-size: 12px; margin-top: 12px; }
}
</style>
</head>

<body>

<div class="container">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
      <h2>Crear Cuenta</h2>
      <span style="font-weight: 900; color: #3498db; letter-spacing: -1px; font-size: 20px;">MODU</span>
  </div>
  
  <label>Nombre de la Cuenta *</label>
  <input id="nombre" placeholder="Ej: BANCOLOMBIA, EFECTIVO, NEQUI..." autocomplete="off">

  <label>Saldo inicial *</label>
  <input id="saldo" type="number" value="0" style="font-size: 20px; font-weight: bold; color: #2c3e50;">

  <div class="botones">
    <button class="guardar" id="btnGuardar">Guardar Cuenta</button>
    <button class="cancelar" type="button" onclick="location.href='cuentas.html'">Cancelar</button>
  </div>
</div>

<script type="module">
// --- EL CELADOR DEL EDIFICIO ---
  const empresaActiva = localStorage.getItem("empresaActiva");
  if (!empresaActiva) {
      window.location.href = "login.html";
  }
  // -------------------------------

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA1BFZ8DZqLx_iimasn9CHgYPKTBhfNfb0",
    authDomain: "modu-6b2b5.firebaseapp.com",
    projectId: "modu-6b2b5",
    storageBucket: "modu-6b2b5.firebasestorage.app",
    messagingSenderId: "139925953689",
    appId: "1:139925953689:web:6f55990a882e4d652bac08"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const btnGuardar = document.getElementById("btnGuardar");

  btnGuardar.addEventListener("click", async () => {
      const nombreInput = document.getElementById("nombre");
      const saldoInput = document.getElementById("saldo");

      // Limpiar errores visuales previos
      nombreInput.classList.remove("error");
      saldoInput.classList.remove("error");

      const nombreLimpio = nombreInput.value.trim().toUpperCase();
      const saldoNum = Number(saldoInput.value);

      // Validación de campo vacío
      if (!nombreLimpio) {
          nombreInput.classList.add("error");
          alert("El nombre de la cuenta es obligatorio.");
          return;
      }

      // Bloquear botón para evitar doble envío
      btnGuardar.disabled = true;
      btnGuardar.innerText = "Guardando...";

      try {
          // 1. Validar duplicados directamente con la base de datos en tiempo real
          const snapshot = await getDocs(collection(db, "cuentas"));
          const yaExiste = snapshot.docs.some(doc => doc.data().nombre.toUpperCase() === nombreLimpio);

          if (yaExiste) {
              nombreInput.classList.add("error");
              alert("Ya existe una cuenta con ese nombre en la nube.");
              btnGuardar.disabled = false;
              btnGuardar.innerText = "Guardar Cuenta";
              return;
          }

          // 2. Guardar en la colección definitiva de Firebase
          const nuevaCuenta = {
              nombre: nombreLimpio,
              saldo: saldoNum,
              timestamp: new Date().toISOString()
          };

          await addDoc(collection(db, "cuentas"), nuevaCuenta);
          
          // Redirección inmediata (la pantalla de cuentas se encargará de refrescar la lista y el caché local)
          window.location.href = "cuentas.html";

      } catch (error) {
          console.error("Error al guardar cuenta:", error);
          alert("Ocurrió un error de conexión al intentar guardar en la nube.");
          btnGuardar.disabled = false;
          btnGuardar.innerText = "Guardar Cuenta";
      }
  });
</script>

</body>
</html>
