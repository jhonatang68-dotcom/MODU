    <script>
        // Fecha dinámica
        function actualizarFecha() {
            const opciones = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: 'numeric', minute: 'numeric', hour12: true };
            const fecha = new Date().toLocaleDateString('es-CO', opciones);
            document.getElementById('fechaActual').innerText = fecha.replace(' de ', ', ').replace(' a las ', ' ');
        }
        actualizarFecha();

        // Lógica de respaldo (Intacta)
        function exportarBackup() {
            const data = {
                clientes: JSON.parse(localStorage.getItem("clientes") || "[]"),
                materiales: JSON.parse(localStorage.getItem("materiales_modu") || "[]"),
                ordenes: JSON.parse(localStorage.getItem("ordenes_grafik") || "[]"),
                ingresos: JSON.parse(localStorage.getItem("ingresos") || "[]"),
                egresos: JSON.parse(localStorage.getItem("egresos") || "[]"),
                cuentas: JSON.parse(localStorage.getItem("cuentas") || "[]")
            };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 2));
            const a = document.createElement('a'); a.href = dataStr; a.download = "RESPALDO_MODU_" + new Date().toISOString().slice(0,10) + ".json";
            a.click();
        }

        function importarBackup(event) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = JSON.parse(e.target.result);
                if(confirm("¿Está seguro? Esto reemplazará toda la información actual.")) {
                    Object.keys(data).forEach(key => localStorage.setItem(key === "materiales" ? "materiales_modu" : key === "ordenes" ? "ordenes_grafik" : key, JSON.stringify(data[key])));
                    location.reload();
                }
            };
            reader.readAsText(event.target.files[0]);
        }
    </script>
