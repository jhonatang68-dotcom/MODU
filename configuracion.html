<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MODU · Configuración</title>

<style>
body { font-family: 'Segoe UI', Arial, sans-serif; background:#f4f6f8; margin:0; color: #334155; }

header {
  background:#111; color:#fff; padding:15px;
  display:flex; align-items:center; justify-content: space-between;
}
.left { display:flex; align-items:center; gap:15px; }
.home-icon { width:22px; height:22px; fill:#f2f2f2; cursor:pointer; transition: 0.2s; }
.home-icon:hover { fill: #3498db; }
strong { font-size: 16px; }

.container {
  padding:20px;
  max-width: 800px;
  margin: 0 auto;
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap:20px;
}

.modulo {
  background:#fff;
  padding:25px 20px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  box-shadow: 0 2px 5px rgba(0,0,0,0.02);
  border: 1px solid #e2e8f0;
  transition: 0.2s ease-in-out;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.modulo-icon {
  width: 32px;
  height: 32px;
  fill: #475569;
  margin-bottom: 12px;
  transition: 0.2s ease-in-out;
}

.modulo:hover {
  background:#f8fafc;
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
  border-color: #cbd5e1;
}

.modulo:hover .modulo-icon { fill: #3498db; }

.modulo-titulo { font-size: 16px; font-weight: bold; color: #1e293b; }

.badge-nube {
  display: block; font-size: 11px; color: #3498db;
  margin-top: 6px; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px;
}

.proximamente { opacity: .4; cursor: not-allowed; background: #f1f5f9; }
.proximamente:hover { transform: none; box-shadow: 0 2px 5px rgba(0,0,0,0.02); border-color: #e2e8f0; background: #f1f5f9; }
.proximamente .modulo-icon { fill: #94a3b8; }
.proximamente:hover .modulo-icon { fill: #94a3b8; }
.badge-espera { display: block; font-size: 11px; color: #64748b; margin-top: 6px; text-transform: uppercase; font-weight: bold; }

@media (max-width: 480px) {
    header { padding: 12px; }
    strong { font-size: 14px; }
    .container { grid-template-columns: 1fr; gap: 15px; padding: 15px; }
    .modulo { padding: 25px 20px; }
}
</style>
</head>

<body>

<header>
  <div class="left">
    <svg class="home-icon" onclick="location.href='index.html'" viewBox="0 0 24 24">
      <path d="M3 10.5L12 3l9 7.5V21a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/>
    </svg>
    <strong>Configuración</strong>
  </div>
  <span style="font-weight: 900; color: #3498db; letter-spacing: -1px; font-size: 18px;">MODU</span>
</header>

<div class="container">

  <!-- Tarifario -->
  <div class="modulo" onclick="location.href='tarifas.html'">
    <svg class="modulo-icon" viewBox="0 0 24 24">
      <path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/>
    </svg>
    <div class="modulo-titulo">Tarifario Maestro</div>
    <span class="badge-nube">Precios en línea</span>
  </div>

  <!-- Ajustes de Empresa (Futuro) -->
  <div class="modulo proximamente">
    <svg class="modulo-icon" viewBox="0 0 24 24">
      <path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z"/>
    </svg>
    <div class="modulo-titulo">Datos de Empresa</div>
    <span class="badge-espera">Próximamente</span>
  </div>

  <!-- Usuarios (Futuro) -->
  <div class="modulo proximamente">
    <svg class="modulo-icon" viewBox="0 0 24 24">
      <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
    </svg>
    <div class="modulo-titulo">Usuarios y Permisos</div>
    <span class="badge-espera">Próximamente</span>
  </div>

</div>

</body>
</html>
