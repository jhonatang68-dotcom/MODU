<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GRapp - Resultados</title>

<style>
body { font-family: Arial, sans-serif; background:#f4f6f8; margin:0; }

header {
  background:#111; color:#fff; padding:15px;
  display:flex; align-items:center; gap:15px;
}

.home-icon {
  width:22px; height:22px; fill:#f2f2f2; cursor:pointer;
}

.container {
  padding:20px;
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap:20px;
}

.modulo {
  background:#fff;
  padding:30px;
  border-radius:10px;
  text-align:center;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,.1);
  transition: 0.3s;
}

.modulo:hover {
  background:#f0f0f0;
  transform: translateY(-3px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.badge-nube {
  display: block;
  font-size: 10px;
  color: #3498db;
  margin-top: 10px;
  text-transform: uppercase;
  font-weight: bold;
}
</style>
</head>

<body>

<header>
  <svg class="home-icon" onclick="location.href='index.html'"
    xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <path d="M3 10.5L12 3l9 7.5V21a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/>
  </svg>
  <span style="font-weight: bold;">Resultados</span>
</header>

<div class="container">

  <div class="modulo" onclick="location.href='cuentas.html'">
    💰 Cuentas
    <span class="badge-nube">Saldos en línea</span>
  </div>

  <div class="modulo" onclick="location.href='resumen_mes.html'">
    📊 Resumen del mes
    <span class="badge-nube">Flujo de caja</span>
  </div>

  <div class="modulo" onclick="location.href='dashboard_dinero.html'">
    📈 Dashboard dinero
    <span class="badge-nube">Gráficos</span>
  </div>

  <div class="modulo" style="opacity:.4; cursor:not-allowed;">
    📉 Dashboard ventas
    <span style="display:block; font-size:10px;">Próximamente</span>
  </div>

</div>

</body>
</html>
