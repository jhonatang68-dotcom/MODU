<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MODU - Resultados</title>

<style>
body { font-family: 'Segoe UI', Arial, sans-serif; background:#f4f6f8; margin:0; color: #334155; }

header {
  background:#111; color:#fff; padding:15px;
  display:flex; align-items:center; justify-content: space-between;
}
.left { display:flex; align-items:center; gap:15px; }
.home-icon { width:22px; height:22px; fill:#f2f2f2; cursor:pointer; transition: 0.2s; }
.home-icon:hover { fill: #3498db; }
strong { font-size: 16px; }

.container {
  padding:20px;
  max-width: 800px;
  margin: 0 auto;
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap:20px;
}

.modulo {
  background:#fff;
  padding:25px 20px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  box-shadow: 0 2px 5px rgba(0,0,0,0.02);
  border: 1px solid #e2e8f0;
  transition: 0.2s ease-in-out;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.modulo-icon {
  width: 32px;
  height: 32px;
  fill: #475569;
  margin-bottom: 12px;
  transition: 0.2s ease-in-out;
}

.modulo:hover {
  background:#f8fafc;
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
  border-color: #cbd5e1;
}

.modulo:hover .modulo-icon {
  fill: #3498db;
}

.modulo-titulo {
  font-size: 16px;
  font-weight: bold;
  color: #1e293b;
}

.badge-nube {
  display: block;
  font-size: 11px;
  color: #3498db;
  margin-top: 6px;
  text-transform: uppercase;
  font-weight: bold;
  letter-spacing: 0.5px;
}

.proximamente {
  opacity: .4;
  cursor: not-allowed;
  background: #f1f5f9;
}
.proximamente:hover {
  transform: none;
  box-shadow: 0 2px 5px rgba(0,0,0,0.02);
  border-color: #e2e8f0;
  background: #f1f5f9;
}
.proximamente .modulo-icon {
  fill: #94a3b8;
}
.proximamente:hover .modulo-icon {
  fill: #94a3b8;
}
.badge-espera {
  display: block;
  font-size: 11px;
  color: #64748b;
  margin-top: 6px;
  text-transform: uppercase;
  font-weight: bold;
}

@media (max-width: 480px) {
    header { padding: 12px; }
    strong { font-size: 14px; }
    .container { grid-template-columns: 1fr; gap: 15px; padding: 15px; }
    .modulo { padding: 25px 20px; }
}
</style>
</head>

<body>

<header>
  <div class="left">
    <svg class="home-icon" onclick="location.href='index.html'" viewBox="0 0 24 24">
      <path d="M3 10.5L12 3l9 7.5V21a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/>
    </svg>
    <strong>Resultados</strong>
  </div>
  <span style="font-weight: 900; color: #3498db; letter-spacing: -1px; font-size: 18px;">MODU</span>
</header>

<div class="container">

  <!-- Cuentas -->
  <div class="modulo" onclick="location.href='cuentas.html'">
    <svg class="modulo-icon" viewBox="0 0 24 24">
      <path d="M19 5H5c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 12H5V7h14v10zm-7-3c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/>
    </svg>
    <div class="modulo-titulo">Cuentas</div>
    <span class="badge-nube">Saldos en línea</span>
  </div>

  <!-- Resumen del Mes -->
  <div class="modulo" onclick="location.href='resumen_mes.html'">
    <svg class="modulo-icon" viewBox="0 0 24 24">
      <path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/>
    </svg>
    <div class="modulo-titulo">Resumen del Mes</div>
    <span class="badge-nube">Flujo de caja</span>
  </div>

  <!-- Dashboard Dinero -->
  <div class="modulo" onclick="location.href='dashboard_dinero.html'">
    <svg class="modulo-icon" viewBox="0 0 24 24">
      <path d="M5 9.2L10.5 14.7L14.7 10.5L20 15.8L21.4 14.4L14.7 7.7L10.5 11.9L6.4 7.8L5 9.2ZM3 3v16c0 1.1.9 2 2 2h16v-2H5V3H3z"/>
    </svg>
    <div class="modulo-titulo">Dashboard Dinero</div>
    <span class="badge-nube">Gráficos</span>
  </div>

  <!-- Dashboard Ventas -->
  <div class="modulo proximamente">
    <svg class="modulo-icon" viewBox="0 0 24 24">
      <path d="M19 6h-2c0-2.76-2.24-5-5-5S7 3.24 7 6H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-7-3c1.66 0 3 1.34 3 3H9c0-1.66 1.34-3 3-3zm7 17H5V8h14v12z"/>
    </svg>
    <div class="modulo-titulo">Dashboard Ventas</div>
    <span class="badge-espera">Próximamente</span>
  </div>

</div>

</body>
</html>
