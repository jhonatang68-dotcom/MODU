<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Imprimiendo O.P... · MODU</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; color: #000; background-color: #f4f4f4; }
        .hoja { 
            width: 185mm; 
            margin: 20px auto; 
            padding: 10mm; 
            background: #fff; 
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            position: relative;
        }
        
        /* CABEZOTE */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end; 
            border-bottom: 2px solid #000; 
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .logo-grafik { font-size: 32px; font-weight: 900; letter-spacing: -2px; }
        
        .info-tiempos { text-align: center; font-size: 13px; }
        .fecha-destacada { font-size: 18px; font-weight: bold; margin: 2px 0; }

        .op-box { text-align: right; line-height: 1.1; }
        .op-txt { font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .op-num { font-size: 35px; font-weight: 900; color: #e74c3c; }

        /* DATOS CLIENTE */
        .cliente-row { font-size: 18px; margin-bottom: 5px; text-transform: uppercase; }
        .tipo-tag { font-size: 14px; font-weight: bold; margin-left: 10px; color: #555; border: 1px solid #555; padding: 2px 5px; border-radius: 3px; }
        .ref-row { font-size: 15px; margin-bottom: 20px; color: #333; }

        /* TABLA TÉCNICA */
        table { width: 100%; border-collapse: collapse; }
        th { background: #f2f2f2; border: 1.5px solid #000; padding: 6px; font-size: 11px; }
        td { border: 1.5px solid #000; padding: 8px; vertical-align: top; font-size: 13px; }
        
        .solo-precios { 
            color: #27ae60; 
            font-weight: bold; 
            text-align: right; 
            background-color: #f9fff9;
        }

        .f-obs { margin-top: 15px; border: 1.5px solid #000; padding: 10px; min-height: 50px; font-size: 12px; }
        .user-stamp { margin-top: 10px; font-size: 10px; text-align: right; color: #777; }

        @media print { 
            body { background: #fff; }
            .no-print, .solo-precios { display: none !important; } 
            .hoja { width: 100%; margin: 0; padding: 0; box-shadow: none; }
            td, th { border: 1.5px solid #000 !important; }
        }
    </style>
</head>
<body>

<div class="no-print" style="background:#2c3e50; padding:15px; text-align:center; position: sticky; top: 0; z-index: 100;">
    <button onclick="window.print()" style="padding:10px 25px; cursor:pointer; background:#27ae60; color:white; border:none; border-radius:4px; font-weight:bold; font-size:16px;">🖨️ CONFIRMAR E IMPRIMIR / PDF</button>
    <button onclick="window.close()" style="padding:10px 15px; margin-left:10px; cursor:pointer; background:#95a5a6; color:white; border:none; border-radius:4px;">Cerrar</button>
</div>

<div class="hoja">
    <div class="header">
        <div class="logo-grafik">GRAFIK</div>
        
        <div class="info-tiempos">
            <div>PEDIDO: <span id="pFechaP">--/--/----</span></div>
            <div class="fecha-destacada">ENTREGA: <span id="pFechaE">--/--/----</span></div>
            <div style="font-size: 16px; font-weight: bold;">HORA: <span id="pHoraE">00:00</span></div>
        </div>

        <div class="op-box">
            <span class="op-txt">Orden de Producción</span><br>
            <span class="op-num" id="pNumOP">000</span>
        </div>
    </div>

    <div class="cliente-row">
        <b>CLIENTE:</b> <span id="pCliente" style="font-weight: 900;">---</span>
        <span id="pTipoCli" class="tipo-tag"></span>
    </div>
    <div class="ref-row"><b>REF:</b> <span id="pRef">---</span></div>

    <table>
        <thead>
            <tr>
                <th width="40">REF.</th>
                <th width="50">CANT.</th>
                <th>DESCRIPCIÓN / MATERIAL / ACABADOS</th>
                <th width="100">MEDIDAS</th>
                <th width="90" class="solo-precios">VALOR</th>
            </tr>
        </thead>
        <tbody id="pCuerpo"></tbody>
    </table>

    <div class="f-obs">
        <b>OBSERVACIONES GENERALES:</b>
        <div id="pObs" style="margin-top:5px; white-space: pre-wrap;"></div>
        
        <div id="pTotalAdmin" class="solo-precios" style="margin-top:15px; font-size:18px; border-top: 1px dashed #27ae60; padding-top:5px;">
            TOTAL OP: $ 0
        </div>
    </div>

    <div class="user-stamp">
        Modu System | Generado por: <span id="pUser">Administración Grafik</span>
    </div>
</div>

<script>
    function formatoColombia(fecha) {
        if(!fecha || fecha === "---") return "---";
        if(fecha.includes('/')) return fecha;
        const parts = fecha.split("-");
        if(parts.length < 3) return fecha;
        return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }

    function cargar() {
        // Buscamos la orden guardada temporalmente para imprimir
        const op = JSON.parse(localStorage.getItem("op_para_imprimir"));
        if(!op) return;

        // Categoría rápida
        let categoria = "CL";
        const dbClientes = JSON.parse(localStorage.getItem("clientes")) || [];
        const cli = dbClientes.find(c => c.nombre === op.cliente);
        if(cli && cli.tipo === "TERCERO") categoria = "TRO";

        document.getElementById("pNumOP").innerText = op.numOP || op.recibo || "S/N";
        document.getElementById("pFechaP").innerText = formatoColombia(op.fechaPedido || op.fecha);
        
        // Manejo de fecha y hora de entrega
        if(op.fechaEntrega && op.fechaEntrega.includes('T')) {
            const [fecha, hora] = op.fechaEntrega.split('T');
            document.getElementById("pFechaE").innerText = formatoColombia(fecha);
            document.getElementById("pHoraE").innerText = hora;
        } else {
            document.getElementById("pFechaE").innerText = formatoColombia(op.fechaEntrega || "---");
        }

        document.getElementById("pCliente").innerText = op.cliente;
        document.getElementById("pRef").innerText = op.ref || "---";
        document.getElementById("pTipoCli").innerText = categoria;

        const cuerpo = document.getElementById("pCuerpo");
        cuerpo.innerHTML = "";
        const letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        let sumaTotal = 0;
        
        // Adaptamos por si los ítems vienen de la nube o del local
        const items = op.items || [];
        items.forEach((it, idx) => {
            const totalItem = Number(it.total || 0);
            sumaTotal += totalItem;
            
            cuerpo.innerHTML += `
                <tr>
                    <td align="center"><b>${letras[idx] || idx + 1}</b></td>
                    <td align="center" style="font-size:16px;"><b>${it.c || it.cantidad}</b></td>
                    <td><b>${it.matNombre || it.descripcion}</b><br><small style="color:#444;">${it.obs || ''}</small></td>
                    <td align="center"><b>${it.w || '-'} x ${it.h || '-'}</b></td>
                    <td class="solo-precios">$ ${Math.round(totalItem).toLocaleString('es-CO')}</td>
                </tr>`;
        });
        
        document.getElementById("pObs").innerText = op.observaciones || "Sin observaciones adicionales.";
        document.getElementById("pTotalAdmin").innerText = "TOTAL ORDEN: $ " + Math.round(sumaTotal).toLocaleString('es-CO');
        
        if(op.usuario) document.getElementById("pUser").innerText = op.usuario;
    }
    
    window.addEventListener('keydown', (e) => {
        if (e.key === "Escape") window.close();
    });

    document.addEventListener("DOMContentLoaded", cargar);
</script>
</body>
</html>
