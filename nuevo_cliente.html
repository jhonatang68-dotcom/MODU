<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<!-- La línea clave para que no se vea de lejos en el celular -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MODU - Gestión de Terceros</title>

<style>
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f8; margin: 0; padding: 0; }
.container {
    max-width: 600px; margin: 40px auto; background: #fff;
    padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}
h2 { margin-top: 0; margin-bottom: 5px; color: #2c3e50; font-size: 22px; }
label { display: block; margin-top: 15px; font-weight: bold; font-size: 13px; color: #34495e; }

input, select, textarea {
    width: 100%; padding: 12px; margin-top: 5px; border-radius: 6px;
    border: 1px solid #dce4ec; box-sizing: border-box; font-size: 15px;
}
input:focus { outline: none; border-color: #3498db; }

.mayus { text-transform: uppercase; }

/* Caja de riesgo adaptativa */
.riesgo {
    display: flex; gap: 15px; margin-top: 10px; padding: 12px;
    background: #f8f9fa; border-radius: 8px; flex-wrap: wrap;
}
.riesgo label { margin-top: 0; cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 14px; }

/* Contenedor de botones */
.botones { margin-top: 25px; display: flex; gap: 12px; }
button { flex: 1; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.3s; }

.verde { color: #27ae60; }
.amarillo { color: #f39c12; }
.rojo { color: #e74c3c; }

.guardar { background: #3498db; color: #fff; }
.cancelar { background: #f1f2f6; color: #57606f; }
.eliminar { background: #feebeb; color: #e74c3c; }

.error { border: 2px solid #e74c3c !important; background: #fff5f5; }

/* Producto solo para proveedor */
#labelProducto, #productoServicio { display: none; }

/* CAMBIOS EXCLUSIVOS PARA CELULAR */
@media (max-width: 480px) {
    .container { margin: 15px; padding: 18px; border-radius: 10px; }
    h2 { font-size: 18px; }
    .riesgo { gap: 10px; justify-content: space-between; }
    .riesgo label { font-size: 13px; }
    /* En celular los botones se apilan uno abajo del otro para comodidad táctil */
    .botones { flex-direction: column; gap: 10px; }
    button { width: 100%; padding: 12px; }
}
</style>
</head>

<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2 id="titulo">Cargando...</h2>
        <span style="font-weight: 900; color: #3498db; letter-spacing: -1px; font-size: 20px;">MODU</span>
    </div>

    <label>Nombre / Razón social *</label>
    <input id="nombre" class="mayus" placeholder="EJ: FÉNIX ARTES GRÁFICAS">

    <label>Tipo *</label>
    <select id="tipo"></select>

    <label>Celular *</label>
    <input id="celular" type="tel" placeholder="300 000 0000">

    <label>Riesgo de Cartera *</label>
    <div class="riesgo" id="riesgoBox">
        <label class="verde"><input type="radio" name="riesgo" value="bajo"> 🟢 Bajo</label>
        <label class="amarillo"><input type="radio" name="riesgo" value="medio"> 🟡 Medio</label>
        <label class="rojo"><input type="radio" name="riesgo" value="alto"> 🔴 Alto</label>
    </div>

    <label id="labelProducto">Producto / Servicio principal</label>
    <input id="productoServicio" class="mayus" placeholder="Ej: PAPEL, ACRÍLICO, LONA">

    <div class="botones">
        <button class="guardar" onclick="guardar()">Guardar Registro</button>
        <button class="cancelar" onclick="cancelar()">Volver</button>
        <button class="eliminar" id="btnEliminar" style="display:none;" onclick="eliminar()">Eliminar</button>
    </div>
</div>

<script type="module">
// --- EL CELADOR DEL EDIFICIO ---
  const empresaActiva = localStorage.getItem("empresaActiva");
  if (!empresaActiva) {
      window.location.href = "login.html";
  }
  // -------------------------------

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, doc, getDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA1BFZ8DZqLx_iimasn9CHgYPKTBhfNfb0",
    authDomain: "modu-6b2b5.firebaseapp.com",
    projectId: "modu-6b2b5",
    storageBucket: "modu-6b2b5.firebasestorage.app",
    messagingSenderId: "139925953689",
    appId: "1:139925953689:web:6f55990a882e4d652bac08"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const params = new URLSearchParams(window.location.search);
  const modo = params.get("modo"); 
  const idEditar = params.get("id");

  const tipoSelect = document.getElementById("tipo");
  const titulo = document.getElementById("titulo");
  const nombreInput = document.getElementById("nombre");
  const celularInput = document.getElementById("celular");
  const productoInput = document.getElementById("productoServicio");

  async function cargarDatos() {
      if (!idEditar) {
          if (modo === "cliente" || !modo) {
              titulo.innerText = "Nuevo Cliente";
              tipoSelect.innerHTML = `<option value="">Seleccione...</option><option value="cliente">Cliente</option><option value="tercero">Tercero</option>`;
          }
          if (modo === "proveedor") {
              titulo.innerText = "Nuevo Proveedor";
              tipoSelect.innerHTML = `<option value="proveedor">Proveedor</option>`;
              tipoSelect.value = "proveedor";
              tipoSelect.disabled = true;
              document.getElementById("labelProducto").style.display = "block";
              productoInput.style.display = "block";
          }
      } else {
          document.getElementById("btnEliminar").style.display = "block";
          titulo.innerText = "Cargando datos...";
          
          try {
              const docRef = doc(db, "clientes", idEditar); 
              const docSnap = await getDoc(docRef);

              if (docSnap.exists()) {
                  const c = docSnap.data();
                  nombreInput.value = c.nombre || "";
                  celularInput.value = c.celular || "";
                  
                  const tipoGuardado = (c.tipo || "cliente").toLowerCase();
                  tipoSelect.innerHTML = `<option value="${tipoGuardado}">${tipoGuardado.toUpperCase()}</option>`;
                  tipoSelect.disabled = true;

                  if (c.riesgo) {
                      const radioRiesgo = document.querySelector(`input[name='riesgo'][value='${c.riesgo.toLowerCase()}']`);
                      if (radioRiesgo) radioRiesgo.checked = true;
                  }

                  if (tipoGuardado === "proveedor") {
                      titulo.innerText = "Editar Proveedor";
                      document.getElementById("labelProducto").style.display = "block";
                      productoInput.style.display = "block";
                      productoInput.value = c.producto || "";
                  } else {
                      titulo.innerText = "Editar Cliente";
                  }
              } else {
                  alert("El registro no existe.");
                  cancelar();
              }
          } catch (error) {
              console.error("Error al cargar:", error);
              alert("Error cargando los datos.");
          }
      }
  }

  window.guardar = async () => {
      let valido = true;
      document.querySelectorAll(".error").forEach(e => e.classList.remove("error"));

      const nombreVal = nombreInput.value.trim().toUpperCase();
      
      if (!nombreVal) { nombreInput.classList.add("error"); valido = false; }
      if (!celularInput.value.trim()) { celularInput.classList.add("error"); valido = false; }
      const riesgo = document.querySelector("input[name='riesgo']:checked");
      if (!riesgo) { document.getElementById("riesgoBox").classList.add("error"); valido = false; }
      if (!valido) return;

      const data = {
          nombre: nombreVal,
          tipo: tipoSelect.value,
          celular: celularInput.value,
          riesgo: riesgo.value,
          producto: tipoSelect.value === "proveedor" ? productoInput.value.toUpperCase() : "",
          fechaActualizacion: new Date().toISOString()
      };

      const btnGuardar = document.querySelector(".guardar");
      btnGuardar.innerText = "Guardando...";
      btnGuardar.disabled = true;

      try {
          if (idEditar) {
              const docRef = doc(db, "clientes", idEditar);
              await updateDoc(docRef, data);
          } else {
              data.fechaRegistro = new Date().toISOString();
              await addDoc(collection(db, "clientes"), data);
          }
          cancelar();
      } catch (error) {
          console.error("Error al guardar:", error);
          alert("Error al conectar con la nube.");
          btnGuardar.innerText = "Guardar Registro";
          btnGuardar.disabled = false;
      }
  };

  window.eliminar = async () => {
      if (!idEditar || !confirm("¿Seguro que deseas eliminar este registro permanentemente de la nube?")) return;
      
      try {
          await deleteDoc(doc(db, "clientes", idEditar));
          cancelar();
      } catch (error) {
          console.error("Error al eliminar:", error);
          alert("No se pudo eliminar el registro.");
      }
  };

  window.cancelar = () => {
      location.href = (tipoSelect.value === "proveedor") ? "proveedores.html" : "clientes.html";
  };

  cargarDatos();
</script>

</body>
</html>
