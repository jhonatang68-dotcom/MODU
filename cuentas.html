<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MODU - Cuentas</title>

<style>
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f8; margin: 0; color: #334155; }
header {
    background: #111; color: white; padding: 15px;
    display: flex; justify-content: space-between; align-items: center;
}
.left { display: flex; align-items: center; gap: 15px; }
.home-icon { width: 22px; height: 22px; fill: #f2f2f2; cursor: pointer; transition: 0.2s; }
.home-icon:hover { fill: #3498db; }
strong { font-size: 16px; }

.actions { display: flex; gap: 8px; }
button {
    padding: 10px 14px; background: #3498db; border: none; color: white;
    border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.2s;
}
button:hover { opacity: 0.9; }

.container { padding: 20px; max-width: 600px; margin: auto; }

.total-card {
    background: #fff; padding: 20px; border-radius: 10px; text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.02); border: 1px solid #e2e8f0; margin-bottom: 20px;
}
.total-card h3 { margin: 0; font-size: 14px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
.total-card .monto { font-size: 28px; font-weight: bold; color: #1e293b; margin-top: 5px; }

.tabla-responsiva { width: 100%; overflow-x: auto; background: white; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); border: 1px solid #e2e8f0; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 14px; text-align: left; font-size: 14px; border-bottom: 1px solid #e2e8f0; }
th { background: #f8fafc; color: #475569; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
tr:last-child td { border-bottom: none; }
.btn-eliminar { background: #e74c3c; padding: 6px 10px; font-size: 12px; }

@media (max-width: 480px) {
    .container { padding: 12px; }
    .total-card .monto { font-size: 24px; }
    header { padding: 12px; }
    strong { font-size: 14px; }
    .actions button { padding: 8px 10px; font-size: 12px; }
}
</style>
</head>

<body>

<header>
  <div class="left">
    <svg class="home-icon" onclick="location.href='resultados.html'" viewBox="0 0 24 24">
      <path d="M3 10.5L12 3l9 7.5V21a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/>
    </svg>
    <strong>Cuentas Disponibles</strong>
  </div>
  <div class="actions">
      <button onclick="location.href='nueva_cuenta.html'">+ Crear Cuenta</button>
  </div>
</header>

<div class="container">

  <div class="total-card">
      <h3>Total Disponible General</h3>
      <div class="monto" id="totalGeneral">$ 0</div>
  </div>

  <div class="tabla-responsiva">
      <table>
        <thead>
          <tr>
            <th>Cuenta</th>
            <th>Saldo Actual</th>
            <th style="text-align: center;">Acción</th>
          </tr>
        </thead>
        <tbody id="tablaCuentas">
            <tr><td colspan="3" style="text-align: center; color: #64748b;">Cargando cuentas desde la nube...</td></tr>
        </tbody>
      </table>
  </div>

</div>

<script type="module">

    // --- EL CELADOR DEL EDIFICIO ---
  const empresaActiva = localStorage.getItem("empresaActiva");
  if (!empresaActiva) {
      window.location.href = "login.html";
  }
  // -------------------------------
  
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA1BFZ8DZqLx_iimasn9CHgYPKTBhfNfb0",
    authDomain: "modu-6b2b5.firebaseapp.com",
    projectId: "modu-6b2b5",
    storageBucket: "modu-6b2b5.firebasestorage.app",
    messagingSenderId: "139925953689",
    appId: "1:139925953689:web:6f55990a882e4d652bac08"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let cuentasMemoria = [];

  onSnapshot(collection(db, "cuentas"), (snapshot) => {
      cuentasMemoria = snapshot.docs.map(doc => ({ firebaseId: doc.id, ...doc.data() }));
      
      // Respaldo en la memoria local mientras conectamos los ingresos y egresos
      localStorage.setItem("cuentas", JSON.stringify(cuentasMemoria.map(c => ({ id: c.firebaseId, nombre: c.nombre, saldo: c.saldo }))));
      
      pintarCuentas();
  });

  function pintarCuentas() {
      const tabla = document.getElementById("tablaCuentas");
      const totalDiv = document.getElementById("totalGeneral");
      tabla.innerHTML = "";
      let total = 0;

      if (cuentasMemoria.length === 0) {
          tabla.innerHTML = `<tr><td colspan="3" style="text-align: center; color: #94a3b8;">No hay cuentas creadas. Usa el botón superior para añadir una.</td></tr>`;
          totalDiv.innerText = "$ 0";
          return;
      }

      cuentasMemoria.forEach(c => {
          const saldoNum = Number(c.saldo) || 0;
          total += saldoNum;

          tabla.innerHTML += `
          <tr>
              <td><strong>${(c.nombre || '').toUpperCase()}</strong></td>
              <td style="color: ${saldoNum < 0 ? '#e74c3c' : '#1e293b'}; font-weight: bold;">
                  $ ${saldoNum.toLocaleString('es-CO')}
              </td>
              <td style="text-align: center;">
                  <button class="btn-eliminar" onclick="eliminarCuentaNube('${c.firebaseId}')">Eliminar</button>
              </td>
          </tr>`;
      });

      totalDiv.innerText = "$ " + total.toLocaleString('es-CO');
  }

  window.eliminarCuentaNube = async (firebaseId) => {
      if (!confirm("¿Seguro que deseas eliminar esta cuenta permanentemente de la nube?")) return;
      try {
          await deleteDoc(doc(db, "cuentas", firebaseId));
      } catch (error) {
          console.error("Error al eliminar:", error);
          alert("No se pudo eliminar la cuenta.");
      }
  };
</script>

</body>
</html>
