<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MODU - Recibo de Caja</title>

<style>
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f8; margin: 0; overflow: hidden; } 

.container {
    max-width: 500px; 
    margin: 20px auto; 
    background: #fff;
    padding: 15px 25px; 
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h2 { margin: 0 0 5px 0; font-size: 1.4rem; color: #2c3e50; }
.numero { font-size: 16px; margin-bottom: 10px; color: #3498db; }

label { 
    display: block; 
    margin-top: 8px; 
    font-weight: bold; 
    font-size: 12px; 
    color: #34495e; 
    text-transform: uppercase;
}

input, select, textarea { 
    width: 100%; 
    padding: 8px; 
    margin-top: 2px; 
    box-sizing: border-box; 
    border: 1px solid #dce4ec; 
    border-radius: 6px; 
    font-size: 14px;
}

textarea { height: 50px; resize: none; } 

input:focus, select:focus { 
    outline: none; 
    border-color: #3498db; 
    box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2); 
    background-color: #f0f7ff; 
}

.botones { margin-top: 20px; display: flex; gap: 10px; }
button {
    flex: 1; padding: 10px; border: none; border-radius: 8px; 
    cursor: pointer; font-weight: bold; font-size: 14px;
}

.guardar { background: #3498db; color: #fff; }
.pdf { background: #2ecc71; color: #fff; }
.cancelar { background: #f1f2f6; color: #57606f; }

.container {
    animation: slideIn 0.3s ease-out;
}
@keyframes slideIn {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}
</style>
</head>

<body>

<div class="container">
  <div style="display: flex; justify-content: space-between; align-items: center;">
      <h2>Recibo de Caja</h2>
      <span style="font-weight: 900; color: #3498db; letter-spacing: -1px;">MODU</span>
  </div>
  
  <div class="numero" id="numeroRecibo"></div>
  
  <label>Fecha del Recibo *</label>
  <input id="fechaManual" type="date">

  <label>Cliente *</label>
  <input type="text" id="clienteInput" list="listaClientes" placeholder="Escribe para buscar cliente..." autocomplete="off">
  <datalist id="listaClientes"></datalist>

  <label>Descripción *</label>
  <textarea id="descripcion" placeholder="¿Por qué concepto entra este dinero?"></textarea>

  <label>Cuenta destino *</label>
  <select id="cuenta"></select>

  <label>Valor *</label>
  <input id="valor" type="text" placeholder="0" style="font-size: 20px; font-weight: bold; color: #2ecc71;">

  <label>Asignar OP (opcional)</label>
  <input id="op" placeholder="Ej: OP-2024-001">

  <div class="botones">
    <button class="guardar" onclick="guardar(false)">Guardar</button>
    <button class="pdf" onclick="guardar(true)">Guardar y PDF</button>
    <button class="cancelar" onclick="location.href='ingresos.html'">Cancelar</button>
  </div>
</div>

<script>
const hoy = new Date();
const fechaHoy = hoy.toISOString().split("T")[0];
document.getElementById("fechaManual").value = fechaHoy;

let clientes = JSON.parse(localStorage.getItem("clientes")) || [];
let cuentas  = JSON.parse(localStorage.getItem("cuentas")) || [];
let ingresos = JSON.parse(localStorage.getItem("ingresos")) || [];

const numeroRecibo = ingresos.length + 1;
document.getElementById("numeroRecibo").innerText = "Recibo No. " + numeroRecibo;

const datalistClientes = document.getElementById("listaClientes");
datalistClientes.innerHTML = clientes
    .filter(c => c.tipo !== "Proveedor") 
    .map(c => `<option value="${c.nombre}">`).join("");

document.getElementById("cuenta").innerHTML =
  '<option value="">Seleccione cuenta...</option>' +
  cuentas.map(c => `<option value="${c.nombre}">${c.nombre}</option>`).join("");

const valorInput = document.getElementById("valor");
valorInput.addEventListener("input", () => {
  let limpio = valorInput.value.replace(/\D/g, "");
  valorInput.value = limpio.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
});

async function guardar(generarPDF){
  const clienteInput = document.getElementById("clienteInput");
  const descripcion = document.getElementById("descripcion");
  const cuenta = document.getElementById("cuenta");
  const op = document.getElementById("op");
  const fechaInput = document.getElementById("fechaManual");

  let ok = true;
  document.querySelectorAll(".error").forEach(e=>e.classList.remove("error"));

  if(!fechaInput.value){ fechaInput.classList.add("error"); ok=false; }
  
  const clienteExiste = clientes.some(c => c.nombre.toUpperCase() === clienteInput.value.trim().toUpperCase());
  if(!clienteInput.value || !clienteExiste){ 
      clienteInput.classList.add("error"); 
      if(clienteInput.value && !clienteExiste) alert("Ese cliente no existe. Créalo primero.");
      ok=false; 
  }

  if(!descripcion.value.trim()){ descripcion.classList.add("error"); ok=false; }
  if(!cuenta.value){ cuenta.classList.add("error"); ok=false; }
  if(!valorInput.value){ valorInput.classList.add("error"); ok=false; }

  if(!ok) return;

  const valor = Number(valorInput.value.replace(/\./g,""));
  if(valor<=0) return alert("Valor inválido");

  const fechaSeleccionada = fechaInput.value; 
  const partes = fechaSeleccionada.split("-");

  const dataIngreso = {
    id: Date.now(),
    recibo: numeroRecibo,
    cliente: clienteInput.value.trim(),
    fecha: fechaSeleccionada,
    mes: parseInt(partes[1]),
    anio: parseInt(partes[0]),
    descripcion: descripcion.value.toUpperCase(),
    cuenta: cuenta.value,
    valor: valor,
    op: op.value,
    estado: "ACTIVO"
  };

  // --- SUBIR A LA NUBE ---
  await window.guardarDato('ingresos', dataIngreso);

  ingresos.push(dataIngreso);

  cuentas = cuentas.map(c =>
    c.nombre === cuenta.value
      ? { ...c, saldo: Number(c.saldo) + valor }
      : c
  );

  localStorage.setItem("ingresos", JSON.stringify(ingresos));
  localStorage.setItem("cuentas", JSON.stringify(cuentas));

  if(generarPDF) alert("MODU: Generando comprobante PDF...");
  window.location.href = "ingresos.html";
}
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA1BFZ8DZqLx_iimasn9CHgYPKTBhfNfb0",
    authDomain: "modu-6b2b5.firebaseapp.com",
    projectId: "modu-6b2b5",
    storageBucket: "modu-6b2b5.firebasestorage.app",
    messagingSenderId: "139925953689",
    appId: "1:139925953689:web:6f55990a882e4d652bac08"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.guardarDato = async (nombreColeccion, objetoDatos) => {
    try {
      await addDoc(collection(db, nombreColeccion), objetoDatos);
      console.log("Ingreso guardado en Firebase");
    } catch (e) {
      console.error("Error en la nube:", e);
    }
  }
</script>

</body>
</html>
