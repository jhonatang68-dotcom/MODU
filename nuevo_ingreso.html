<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MODU - Recibo de Caja</title>

<style>
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f8; margin: 0; padding: 0; color: #334155; } 

.container {
    max-width: 500px; margin: 20px auto; background: #fff;
    padding: 20px 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

h2 { margin: 0 0 5px 0; font-size: 22px; color: #2c3e50; }
.numero { font-size: 16px; margin-bottom: 15px; color: #3498db; font-weight: bold; }

label { display: block; margin-top: 15px; font-weight: bold; font-size: 13px; color: #34495e; text-transform: uppercase; }

input, select, textarea { 
    width: 100%; padding: 12px; margin-top: 5px; box-sizing: border-box; 
    border: 1px solid #dce4ec; border-radius: 6px; font-size: 15px;
}
textarea { height: 60px; resize: none; } 
input:focus, select:focus, textarea:focus { outline: none; border-color: #3498db; background-color: #f0f7ff; }

.botones { margin-top: 25px; display: flex; gap: 10px; }
button { flex: 1; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; }

.guardar { background: #3498db; color: #fff; }
.guardar:hover { background: #2980b9; }
.pdf { background: #2ecc71; color: #fff; }
.pdf:hover { background: #27ae60; }
.cancelar { background: #f1f2f6; color: #57606f; }
.cancelar:hover { background: #e2e8f0; }

.error { border-color: #e74c3c !important; background-color: #fdedec !important; }

@media (max-width: 480px) {
    .container { margin: 15px; padding: 20px; border-radius: 10px; }
    .botones { flex-direction: column; gap: 10px; }
    button { width: 100%; padding: 12px; }
    label { font-size: 12px; margin-top: 12px; }
}
</style>
</head>

<body>

<div class="container">
  <div style="display: flex; justify-content: space-between; align-items: center;">
      <h2>Recibo de Caja</h2>
      <span style="font-weight: 900; color: #3498db; letter-spacing: -1px; font-size: 20px;">MODU</span>
  </div>
  
  <div class="numero" id="numeroRecibo">Cargando consecutivo...</div>
  
  <label>Fecha del Recibo *</label>
  <input id="fechaManual" type="date">

  <label>Cliente *</label>
  <input type="text" id="clienteInput" list="listaClientes" placeholder="Escribe para buscar cliente..." autocomplete="off">
  <datalist id="listaClientes"></datalist>

  <label>Descripción *</label>
  <textarea id="descripcion" placeholder="¿Por qué concepto entra este dinero?"></textarea>

  <label>Cuenta destino *</label>
  <select id="cuenta">
      <option value="">Cargando cuentas de la nube...</option>
  </select>

  <label>Valor *</label>
  <input id="valor" type="text" placeholder="0" style="font-size: 22px; font-weight: bold; color: #2ecc71;">

  <label>Asignar OP (opcional)</label>
  <input id="op" placeholder="Ej: OP-2024-001">

  <div class="botones">
    <button class="guardar" id="btnGuardar" onclick="ejecutarGuardado(false)">Guardar</button>
    <button class="pdf" id="btnPdf" onclick="ejecutarGuardado(true)">Guardar y PDF</button>
    <button class="cancelar" onclick="location.href='ingresos.html'">Cancelar</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA1BFZ8DZqLx_iimasn9CHgYPKTBhfNfb0",
    authDomain: "modu-6b2b5.firebaseapp.com",
    projectId: "modu-6b2b5",
    storageBucket: "modu-6b2b5.firebasestorage.app",
    messagingSenderId: "139925953689",
    appId: "1:139925953689:web:6f55990a882e4d652bac08"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const hoy = new Date();
  document.getElementById("fechaManual").value = hoy.toISOString().split("T")[0];

  const valorInput = document.getElementById("valor");
  valorInput.addEventListener("input", () => {
    let limpio = valorInput.value.replace(/\D/g, "");
    valorInput.value = limpio.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  });

  let proximoRecibo = 1;
  let clientesNube = [];
  let cuentasNube = [];

  async function cargarDatosIniciales() {
      try {
          const ingresosSnap = await getDocs(collection(db, "ingresos"));
          proximoRecibo = ingresosSnap.size + 1;
          document.getElementById("numeroRecibo").innerText = "Recibo No. " + proximoRecibo;

          const clientesSnap = await getDocs(collection(db, "clientes"));
          clientesNube = clientesSnap.docs.map(doc => doc.data());
          document.getElementById("listaClientes").innerHTML = clientesNube
              .filter(c => c.tipo && c.tipo.toLowerCase() !== "proveedor")
              .map(c => `<option value="${c.nombre}">`).join("");

          const cuentasSnap = await getDocs(collection(db, "cuentas"));
          cuentasNube = cuentasSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          document.getElementById("cuenta").innerHTML = '<option value="">Seleccione cuenta...</option>' +
            cuentasNube.map(c => `<option value="${c.id}">${c.nombre} ($ ${Number(c.saldo).toLocaleString()})</option>`).join("");

      } catch (error) {
          console.error("Error cargando datos:", error);
          document.getElementById("numeroRecibo").innerText = "Error de conexión";
      }
  }

  window.ejecutarGuardado = async (generarPDF) => {
      const btnGuardar = document.getElementById("btnGuardar");
      const btnPdf = document.getElementById("btnPdf");
      const clienteInput = document.getElementById("clienteInput");
      const descripcion = document.getElementById("descripcion");
      const cuentaSelect = document.getElementById("cuenta");
      const op = document.getElementById("op");
      const fechaInput = document.getElementById("fechaManual");

      let ok = true;
      document.querySelectorAll(".error").forEach(e=>e.classList.remove("error"));

      if(!fechaInput.value){ fechaInput.classList.add("error"); ok=false; }
      
      const clienteValido = clientesNube.some(c => c.nombre.toUpperCase() === clienteInput.value.trim().toUpperCase());
      if(!clienteInput.value || !clienteValido){ 
          clienteInput.classList.add("error"); 
          if(clienteInput.value && !clienteValido) alert("Ese cliente no existe en tu base de datos.");
          ok=false; 
      }

      if(!descripcion.value.trim()){ descripcion.classList.add("error"); ok=false; }
      if(!cuentaSelect.value){ cuentaSelect.classList.add("error"); ok=false; }
      if(!valorInput.value){ valorInput.classList.add("error"); ok=false; }

      const valorFinal = Number(valorInput.value.replace(/\./g,""));
      if(valorFinal <= 0) { alert("Valor inválido"); ok=false; }

      if(!ok) return;

      btnGuardar.disabled = true; btnGuardar.innerText = "Guardando...";
      btnPdf.disabled = true; btnPdf.innerText = "Guardando...";

      // Lógica matemática para la cuenta
      const cuentaId = cuentaSelect.value;
      const cuentaSeleccionada = cuentasNube.find(c => c.id === cuentaId);
      const nombreCuenta = cuentaSeleccionada.nombre;
      const nuevoSaldo = Number(cuentaSeleccionada.saldo) + valorFinal;

      const partesFecha = fechaInput.value.split("-");
      const dataIngreso = {
          id: Date.now(),
          recibo: proximoRecibo,
          cliente: clienteInput.value.trim().toUpperCase(),
          fecha: fechaInput.value,
          mes: parseInt(partesFecha[1]),
          anio: parseInt(partesFecha[0]),
          descripcion: descripcion.value.trim().toUpperCase(),
          cuenta: nombreCuenta, // Guardamos el nombre para que el historial se vea bien
          valor: valorFinal,
          op: op.value.trim().toUpperCase() || "",
          estado: "ACTIVO",
          timestamp: new Date().toISOString()
      };

      try {
          await addDoc(collection(db, "ingresos"), dataIngreso);
          await updateDoc(doc(db, "cuentas", cuentaId), { saldo: nuevoSaldo }); // Actualiza saldo en Firebase

          if(generarPDF) alert("MODU: Simulando generación de comprobante PDF...");
          window.location.href = "ingresos.html";

      } catch (error) {
          console.error("Error al guardar:", error);
          alert("Error de conexión. No se pudo guardar el ingreso.");
          btnGuardar.disabled = false; btnGuardar.innerText = "Guardar";
          btnPdf.disabled = false; btnPdf.innerText = "Guardar y PDF";
      }
  };

  cargarDatosIniciales();
</script>

</body>
</html>
